<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 前沿技术追踪阅读器</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --color-openai: #10a37f;
            --color-anthropic: #d97706;
            --color-google: #4285f4;
            --color-deepseek: #7c3aed;
            --color-glm: #2563eb;
            --color-kimi: #0f766e;
            --color-doubao: #ea580c;
            --color-huggingface: #facc15;
            --color-arxiv: #b91c1c;
            --color-meta: #2563eb;
            --color-langchain: #15803d;
            --color-llamaindex: #4338ca;
            --color-vercel: #111827;
            --color-nvidia: #76b900;
            --color-amd: #d32f2f;
            --color-community: #4b5563;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.65;
            padding: 24px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
        }

        .subtitle {
            margin: 0 0 16px;
            color: var(--text-muted);
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: #eef2ff;
            border: 1px solid #dbeafe;
            padding: 6px 14px;
            border-radius: 999px;
            display: inline-block;
        }

        #feed-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--card-bg);
            border-left: 5px solid #cbd5e1;
            border-radius: 10px;
            padding: 18px 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .post-title {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .post-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        .post-title a:hover {
            color: #2563eb;
        }

        .post-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .source-badge {
            padding: 3px 9px;
            border-radius: 999px;
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .post-description {
            color: #4b5563;
            font-size: 0.96rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            background: var(--card-bg);
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 32px 20px;
        }

        .src-openai { border-left-color: var(--color-openai); } .src-openai .source-badge { background-color: var(--color-openai); }
        .src-anthropic { border-left-color: var(--color-anthropic); } .src-anthropic .source-badge { background-color: var(--color-anthropic); }
        .src-google { border-left-color: var(--color-google); } .src-google .source-badge { background-color: var(--color-google); }
        .src-deepseek { border-left-color: var(--color-deepseek); } .src-deepseek .source-badge { background-color: var(--color-deepseek); }
        .src-glm { border-left-color: var(--color-glm); } .src-glm .source-badge { background-color: var(--color-glm); }
        .src-kimi { border-left-color: var(--color-kimi); } .src-kimi .source-badge { background-color: var(--color-kimi); }
        .src-doubao { border-left-color: var(--color-doubao); } .src-doubao .source-badge { background-color: var(--color-doubao); }
        .src-huggingface { border-left-color: var(--color-huggingface); } .src-huggingface .source-badge { background-color: var(--color-huggingface); color: #111827; }
        .src-arxiv { border-left-color: var(--color-arxiv); } .src-arxiv .source-badge { background-color: var(--color-arxiv); }
        .src-meta { border-left-color: var(--color-meta); } .src-meta .source-badge { background-color: var(--color-meta); }
        .src-langchain { border-left-color: var(--color-langchain); } .src-langchain .source-badge { background-color: var(--color-langchain); }
        .src-llamaindex { border-left-color: var(--color-llamaindex); } .src-llamaindex .source-badge { background-color: var(--color-llamaindex); }
        .src-vercel { border-left-color: var(--color-vercel); } .src-vercel .source-badge { background-color: var(--color-vercel); }
        .src-nvidia { border-left-color: var(--color-nvidia); } .src-nvidia .source-badge { background-color: var(--color-nvidia); color: #111827; }
        .src-amd { border-left-color: var(--color-amd); } .src-amd .source-badge { background-color: var(--color-amd); }
        .src-community { border-left-color: var(--color-community); } .src-community .source-badge { background-color: var(--color-community); }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .post-header { flex-direction: column; }
            .post-meta { white-space: normal; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI 前沿技术追踪阅读器</h1>
            <p class="subtitle">自动聚合全球主流 AI 实验室、开源社区与研究博客的最新动态。</p>
            <!-- START_UPDATE_TIME -->
            <div class="status">系统最后自动更新于：正在等待下一次同步...（每 3 小时自动刷新）</div>
            <!-- END_UPDATE_TIME -->
        </header>

        <main id="feed-container">
            <!-- START_FEED_CONTENT -->
            <section class="empty-state">
                GitHub Actions 会在下一次运行时自动把最新资讯渲染到这里。
            </section>
            <!-- END_FEED_CONTENT -->
        </main>
    </div>
</body>
</html>
