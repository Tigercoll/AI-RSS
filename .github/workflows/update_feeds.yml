name: Update AI Feeds Daily

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update index and README
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');

            const feeds = [
              { name: "OpenAI", class: "openai", url: "https://rsshub.rssforever.com/openai/news" },
              { name: "Anthropic", class: "anthropic", url: "https://rsshub.rssforever.com/anthropic/research" },
              { name: "Google DeepMind", class: "google", url: "https://deepmind.com/blog/feed/basic/" },
              { name: "Meta AI Research", class: "meta", url: "https://ai.meta.com/blog/rss/" },
              { name: "AWS ML Blog", class: "aws", url: "https://aws.amazon.com/blogs/machine-learning/feed/" },
              { name: "NVIDIA Developer Blog", class: "nvidia", url: "https://developer.nvidia.com/blog/feed" },
              { name: "DeepSeek GitHub", class: "deepseek", url: "https://github.com/deepseek-ai.atom" },
              { name: "Hugging Face Blog", class: "huggingface", url: "https://huggingface.co/blog/feed.xml" },
              { name: "HF Daily Papers", class: "huggingface", url: "https://rsshub.rssforever.com/huggingface/daily-papers" },
              { name: "vLLM Releases", class: "vllm", url: "https://github.com/vllm-project/vllm/releases.atom" },
              { name: "Ollama Releases", class: "ollama", url: "https://github.com/ollama/ollama/releases.atom" },
              { name: "Transformers Releases", class: "transformers", url: "https://github.com/huggingface/transformers/releases.atom" },
              { name: "PyTorch Releases", class: "pytorch", url: "https://github.com/pytorch/pytorch/releases.atom" },
              { name: "Qwen Code Releases", class: "qwen", url: "https://github.com/QwenLM/qwen-code/releases.atom" },
              { name: "PaddlePaddle Releases", class: "paddle", url: "https://github.com/PaddlePaddle/Paddle/releases.atom" }
            ];

            function decodeHtmlEntities(text = '') {
              return text
                .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'")
                .replace(/&amp;/g, '&')
                .replace(/&nbsp;/g, ' ');
            }

            function stripHtml(text = '') {
              return decodeHtmlEntities(text)
                .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ')
                .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ')
                .replace(/<[^>]+>/g, ' ')
                .replace(/[\r\n\t]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function normalizeText(text = '') {
              return decodeHtmlEntities(text)
                .replace(/[\u0000-\u001f]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function clipText(text = '', max = 140) {
              const normalized = normalizeText(text);
              return normalized.length > max ? `${normalized.slice(0, max)}...` : normalized;
            }

            function escapeHtml(text = '') {
              return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
            }

            function isLowQualitySummary(text = '') {
              const normalized = normalizeText(text);
              if (!normalized) return true;

              const compact = normalized.replace(/\s+/g, '');
              const alphaHanCount = (compact.match(/[A-Za-z\u4e00-\u9fff]/g) || []).length;
              const digitCount = (compact.match(/[0-9]/g) || []).length;
              const punctuationCount = (compact.match(/[._\-\\/|()[\]{}:;,+=*@#$%^&~`]/g) || []).length;

              if (alphaHanCount < 12) return true;
              if (alphaHanCount / Math.max(compact.length, 1) < 0.3) return true;
              if ((digitCount + punctuationCount) / Math.max(compact.length, 1) > 0.55) return true;
              if (/([0-9]\s*){10,}/.test(normalized)) return true;
              if (/([._\-\\/|]\s*){8,}/.test(normalized)) return true;
              if (/(\b[0-9.]+\b[\s,;:]*){6,}/.test(normalized)) return true;

              return false;
            }

            function cleanDescription(raw, title) {
              const clean = normalizeText(stripHtml(raw));
              if (!clean) {
                return `点击标题查看《${title}》原文。`;
              }
              if (/PostDetail-module|page-wrapper|class=|function\s*\(|export\s+default/i.test(clean)) {
                return `点击标题查看《${title}》原文。`;
              }
              if (isLowQualitySummary(clean)) {
                return `点击标题查看《${title}》原文。`;
              }
              return clipText(clean, 140);
            }

            function getTagValue(itemStr, tagName) {
              const match = itemStr.match(new RegExp(`<${tagName}[^>]*>([\\s\\S]*?)<\\/${tagName}>`, 'i'));
              return match ? decodeHtmlEntities(match[1]).trim() : '';
            }

            function getLink(itemStr) {
              const directLink = getTagValue(itemStr, 'link');
              if (directLink && /^https?:\/\//i.test(directLink)) {
                return directLink;
              }
              const atomLink = itemStr.match(/<link[^>]+href=["']([^"']+)["']/i);
              return atomLink ? atomLink[1] : '#';
            }

            const articleHtmlCache = new Map();
            const aiSummaryCache = new Map();

            async function fetchArticleHtml(link) {
              if (!/^https?:\/\//i.test(link)) return '';
              if (articleHtmlCache.has(link)) return articleHtmlCache.get(link);

              try {
                const response = await fetch(link, {
                  headers: {
                    'User-Agent': 'Mozilla/5.0 AI-RSS/1.0',
                    'Accept': 'text/html,application/xhtml+xml'
                  },
                  redirect: 'follow'
                });

                if (!response.ok) {
                  articleHtmlCache.set(link, '');
                  return '';
                }

                const html = await response.text();
                articleHtmlCache.set(link, html);
                return html;
              } catch (error) {
                console.error(`Failed to fetch article page ${link}:`, error);
                articleHtmlCache.set(link, '');
                return '';
              }
            }

            function extractMetaContent(html, attrName, attrValue) {
              const patterns = [
                new RegExp(`<meta[^>]+${attrName}=["']${attrValue}["'][^>]+content=["']([\\s\\S]*?)["'][^>]*>`, 'i'),
                new RegExp(`<meta[^>]+content=["']([\\s\\S]*?)["'][^>]+${attrName}=["']${attrValue}["'][^>]*>`, 'i')
              ];

              for (const pattern of patterns) {
                const match = html.match(pattern);
                if (match?.[1]) {
                  return normalizeText(match[1]);
                }
              }
              return '';
            }

            function extractPreferredMetaDescription(html = '') {
              return (
                extractMetaContent(html, 'property', 'og:description') ||
                extractMetaContent(html, 'name', 'description') ||
                extractMetaContent(html, 'name', 'twitter:description')
              );
            }

            function extractReadableArticleText(html = '') {
              return normalizeText(
                decodeHtmlEntities(html)
                  .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ')
                  .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ')
                  .replace(/<svg[^>]*>[\s\S]*?<\/svg>/gi, ' ')
                  .replace(/<noscript[^>]*>[\s\S]*?<\/noscript>/gi, ' ')
                  .replace(/<(header|footer|nav|aside)[^>]*>[\s\S]*?<\/\1>/gi, ' ')
                  .replace(/<[^>]+>/g, ' ')
                  .replace(/https?:\/\/\S+/g, ' ')
                  .replace(/\b[a-z0-9_-]{24,}\b/gi, ' ')
                  .replace(/\s+/g, ' ')
              );
            }

            async function aiSummarizePost(title, sourceName, rawText) {
              const input = normalizeText(rawText).slice(0, 2500);
              if (input.length < 80) return '';

              const cacheKey = `${sourceName}::${title}::${input.slice(0, 300)}`;
              if (aiSummaryCache.has(cacheKey)) return aiSummaryCache.get(cacheKey);

              try {
                const response = await fetch('https://models.github.ai/inference/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'X-GitHub-Api-Version': '2022-11-28'
                  },
                  body: JSON.stringify({
                    model: 'openai/gpt-4.1',
                    temperature: 0.2,
                    max_tokens: 160,
                    messages: [
                      {
                        role: 'system',
                        content: '你是一个技术编辑。请根据输入内容生成 45 到 90 字的简体中文摘要。要求准确、自然、不夸张、不编造，不要出现“本文介绍了”之类空话，只输出摘要正文。'
                      },
                      {
                        role: 'user',
                        content: `来源：${sourceName}\n标题：${title}\n原始内容：${input}`
                      }
                    ]
                  })
                });

                if (!response.ok) {
                  aiSummaryCache.set(cacheKey, '');
                  return '';
                }

                const data = await response.json();
                const summary = clipText(data?.choices?.[0]?.message?.content?.trim() || '', 120);
                aiSummaryCache.set(cacheKey, summary);
                return summary;
              } catch (error) {
                console.error(`Failed to summarize post ${title}:`, error);
                aiSummaryCache.set(cacheKey, '');
                return '';
              }
            }

            async function resolveDescription({ title, sourceName, link, rawDesc }) {
              const direct = cleanDescription(rawDesc, title);
              if (!isLowQualitySummary(direct) && !/^点击标题查看/.test(direct)) {
                return direct;
              }

              const articleHtml = await fetchArticleHtml(link);
              if (articleHtml) {
                const metaDescription = clipText(extractPreferredMetaDescription(articleHtml), 140);
                if (!isLowQualitySummary(metaDescription)) {
                  return metaDescription;
                }

                const articleText = extractReadableArticleText(articleHtml);
                const readableExcerpt = clipText(articleText, 140);
                if (!isLowQualitySummary(readableExcerpt)) {
                  return readableExcerpt;
                }

                const aiSummary = await aiSummarizePost(title, sourceName, articleText);
                if (!isLowQualitySummary(aiSummary)) {
                  return aiSummary;
                }
              }

              const rawTextSummary = await aiSummarizePost(title, sourceName, stripHtml(rawDesc));
              if (!isLowQualitySummary(rawTextSummary)) {
                return rawTextSummary;
              }

              return `点击标题查看《${title}》原文。`;
            }

            async function fetchFeed(feed) {
              try {
                console.log(`Fetching ${feed.name}...`);
                const response = await fetch(feed.url, {
                  headers: { 'User-Agent': 'Mozilla/5.0 AI-RSS/1.0' }
                });
                if (!response.ok) {
                  console.log(`Skip ${feed.name}: HTTP ${response.status}`);
                  return [];
                }

                const text = await response.text();
                const items = text.split(/<item\b[^>]*>|<entry\b[^>]*>/i).slice(1);

                return await Promise.all(items.slice(0, 4).map(async item => {
                  const title = getTagValue(item, 'title') || '未命名更新';
                  const link = getLink(item);
                  const pubDateStr =
                    getTagValue(item, 'pubDate') ||
                    getTagValue(item, 'updated') ||
                    getTagValue(item, 'published');
                  const timestamp = pubDateStr ? new Date(pubDateStr).getTime() : 0;
                  const rawDesc =
                    getTagValue(item, 'description') ||
                    getTagValue(item, 'summary') ||
                    getTagValue(item, 'content:encoded') ||
                    getTagValue(item, 'content');
                  const description = await resolveDescription({
                    title,
                    sourceName: feed.name,
                    link,
                    rawDesc
                  });

                  return {
                    title,
                    link,
                    timestamp,
                    dateStr: timestamp
                      ? new Date(timestamp).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
                      : '未知时间',
                    description,
                    sourceName: feed.name,
                    sourceClass: feed.class
                  };
                }));
              } catch (error) {
                console.error(`Failed to fetch ${feed.name}:`, error);
                return [];
              }
            }

            async function generateProjectIntro(posts) {
              const fallback = 'AI-RSS 是一个自动聚合全球主流 AI 官方动态的静态阅读项目，定时抓取 OpenAI、Anthropic、Google DeepMind、Hugging Face 等信源，并同步生成网页与 README 摘要，方便快速跟踪前沿模型、论文和产品更新。';

              try {
                const latestTitles = posts
                  .slice(0, 6)
                  .map((post, index) => `${index + 1}. ${post.title} (${post.sourceName})`)
                  .join('\n');

                const response = await fetch('https://models.github.ai/inference/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'X-GitHub-Api-Version': '2022-11-28'
                  },
                  body: JSON.stringify({
                    model: 'openai/gpt-4.1',
                    temperature: 0.3,
                    max_tokens: 180,
                    messages: [
                      {
                        role: 'system',
                        content: '你是一个 GitHub README 文档助手。请生成准确、克制、自然的项目简介。只输出一段简体中文正文，不要标题，不要列表，不要引号。'
                      },
                      {
                        role: 'user',
                        content: `请根据以下信息，为仓库 AI-RSS 生成 80 到 120 字的 README 简介。\n\n项目用途：自动聚合全球主流 AI 官方 RSS 动态。\n输出形式：静态 index.html 阅读页 + README 最新摘要。\n更新方式：GitHub Actions 每 3 小时自动更新。\n目标读者：想快速追踪模型、论文、产品发布的人。\n最近样例更新：\n${latestTitles}`
                      }
                    ]
                  })
                });

                if (!response.ok) {
                  console.log(`GitHub Models intro generation failed: HTTP ${response.status}`);
                  return fallback;
                }

                const data = await response.json();
                const intro = data?.choices?.[0]?.message?.content?.trim();
                return intro || fallback;
              } catch (error) {
                console.error('GitHub Models intro generation error:', error);
                return fallback;
              }
            }

            function renderPostsHtml(posts) {
              if (!posts.length) {
                return `
                  <section class="empty-state">
                    本轮没有成功抓取到可展示的资讯，请稍后再试。
                  </section>
                `.trim();
              }

              return posts.map(post => `
                <article class="post-card src-${post.sourceClass}">
                  <div class="post-header">
                    <h2 class="post-title"><a href="${post.link}" target="_blank" rel="noopener noreferrer">${escapeHtml(post.title)}</a></h2>
                    <div class="post-meta">
                      <span class="source-badge">${escapeHtml(post.sourceName)}</span>
                      <time>${escapeHtml(post.dateStr)}</time>
                    </div>
                  </div>
                  <div class="post-description">${escapeHtml(post.description)}</div>
                </article>
              `).join('\n');
            }

            function renderPostsMarkdown(posts) {
              if (!posts.length) {
                return '⚠️ 本轮没有成功抓取到可展示的资讯，请稍后刷新查看。';
              }

              return posts.map(post => {
                return [
                  `### 📢 [${post.title}](${post.link})`,
                  `**来源:** \`${post.sourceName}\` | **时间:** \`${post.dateStr}\``,
                  '',
                  `> 💡 ${post.description}`,
                  '',
                  '---'
                ].join('\n');
              }).join('\n\n');
            }

            const allPosts = (await Promise.all(feeds.map(fetchFeed))).flat();
            allPosts.sort((a, b) => b.timestamp - a.timestamp);

            const finalPosts = allPosts.slice(0, 25);
            const readmePosts = allPosts.slice(0, 20);
            const nowStr = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const intro = await generateProjectIntro(finalPosts);

            const indexPath = 'index.html';
            const indexTemplate = fs.readFileSync(indexPath, 'utf8');
            const indexOutput = indexTemplate
              .replace(
                /<!-- START_UPDATE_TIME -->[\s\S]*?<!-- END_UPDATE_TIME -->/,
                `<!-- START_UPDATE_TIME -->\n<div class="status">系统最后自动更新于：${nowStr}（每 3 小时自动刷新）</div>\n<!-- END_UPDATE_TIME -->`
              )
              .replace(
                /<!-- START_FEED_CONTENT -->[\s\S]*?<!-- END_FEED_CONTENT -->/,
                `<!-- START_FEED_CONTENT -->\n${renderPostsHtml(finalPosts)}\n<!-- END_FEED_CONTENT -->`
              );
            fs.writeFileSync(indexPath, indexOutput);

            const readmePath = fs.existsSync('README.md') ? 'README.md' : 'readme.md';
            let readmeTemplate = fs.readFileSync(readmePath, 'utf8');
            readmeTemplate = readmeTemplate.replace(
              /<!-- START_PROJECT_INTRO -->[\s\S]*?<!-- END_PROJECT_INTRO -->/,
              `<!-- START_PROJECT_INTRO -->\n${intro}\n<!-- END_PROJECT_INTRO -->`
            );
            readmeTemplate = readmeTemplate.replace(
              /<!-- START_LIVE_FEEDS -->[\s\S]*?<!-- END_LIVE_FEEDS -->/,
              `<!-- START_LIVE_FEEDS -->\n${renderPostsMarkdown(readmePosts)}\n<!-- END_LIVE_FEEDS -->`
            );
            readmeTemplate = readmeTemplate.replace(
              /⏳ 最后自动更新时间：.*/,
              `⏳ 最后自动更新时间：${nowStr}`
            );
            fs.writeFileSync(readmePath, readmeTemplate);

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md index.html .github/workflows/update_feeds.yml
          git diff --cached --quiet && exit 0
          git commit -m "🤖 自动同步 AI 动态与 README 简介 [skip ci]"
          git push
